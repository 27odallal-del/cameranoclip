plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '6.1.0'
}

group = 'com.cameranoclip'
version = '1.0'

repositories {
    mavenCentral()
    // Points the compiler directly to the inside of your repository directory
    flatDir {
        dirs '.'
    }
    // Pulls Mojang assets seamlessly for compilation references
    maven {
        url = 'https://minecraft.net'
    }
}

dependencies {
    // Reads your uploaded file directly from the repository floor
    implementation name: 'mixin-0.8.5'
    
    // Links official Minecraft 1.8.9 signatures to satisfy EntityRenderer calls
    compileOnly 'com.mojang:minecraft:1.8.9'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    sourceCompatibility = '1.8'
    targetCompatibility = '1.8'
}

shadowJar {
    archiveClassifier.set('')
    manifest {
        attributes(
            'Manifest-Version': '1.0',
            'TweakClass': 'org.spongepowered.asm.launch.MixinTweaker',
            'MixinConfigs': 'mixins.cameranoclip.json',
            'FMLCorePluginContainsFMLMod': 'true'
        )
    }
}

build.dependsOn shadowJar
