plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '6.1.0'
}

group = 'com.cameranoclip'
version = '1.0'

repositories {
    mavenCentral()
    maven {
        url = 'https://spongepowered.org'
    }
    // Adds Mojang's asset server so the builder can see Minecraft's files
    maven {
        url = 'https://minecraft.net'
    }
}

dependencies {
    implementation 'org.spongepowered:mixin:0.8.5'
    
    // Links the official Minecraft 1.8.9 client jar directly for compilation references
    compileOnly 'com.mojang:minecraft:1.8.9'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    sourceCompatibility = '1.8'
    targetCompatibility = '1.8'
}

shadowJar {
    archiveClassifier.set('')
    manifest {
        attributes(
            'Manifest-Version': '1.0',
            'TweakClass': 'org.spongepowered.asm.launch.MixinTweaker',
            'MixinConfigs': 'mixins.cameranoclip.json',
            'FMLCorePluginContainsFMLMod': 'true'
        )
    }
}

build.dependsOn shadowJar
