plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '6.1.0'
}

group = 'com.cameranoclip'
version = '1.0'

repositories {
    mavenCentral()
    // Instructs the builder to use the loose jar assets in your repository floor
    flatDir {
        dirs '.'
    }
}

dependencies {
    // Reads your uploaded Mixin asset locally
    implementation name: 'mixin-0.8.5'
    
    // Reads your uploaded Minecraft client asset locally to satisfy EntityRenderer signatures
    compileOnly name: 'client'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    sourceCompatibility = '1.8'
    targetCompatibility = '1.8'
}

shadowJar {
    archiveClassifier.set('')
    manifest {
        attributes(
            'Manifest-Version': '1.0',
            'TweakClass': 'org.spongepowered.asm.launch.MixinTweaker',
            'MixinConfigs': 'mixins.cameranoclip.json',
            'FMLCorePluginContainsFMLMod': 'true'
        )
    }
}

build.dependsOn shadowJar
