name: Compile Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build Mod with Gradle
      run: ./gradlew build --no-daemon || gradlee build --no-daemon || gradle build

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v4
      with:
        name: CameraNoClip-Jar
        path: build/libs/*.jar
